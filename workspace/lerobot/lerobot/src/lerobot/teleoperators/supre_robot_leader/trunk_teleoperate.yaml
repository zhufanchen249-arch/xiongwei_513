# -----------------------------------------------------------------
# Main configuration file for SupreRobot teleoperation
#
# How to use:
#   python teleoperate.py --config_path /path/to/this/file.yaml
# -----------------------------------------------------------------

# ===============================================
# Teleoperator (Leader) Configuration
# ===============================================
teleop:
  # Specifies which subclass of TeleoperatorConfig to use.
  # This matches the name in `@TeleoperatorConfig.register_subclass("supre_robot_leader")`
  type: supre_robot_leader

  # Path to the joint configuration file for the leader robot.
  # Corresponds to: SupreRobotLeaderConfig.joint_config_path
  joint_config_file: "trunk_config_supre_robot_joint.yaml"

  # Direction multipliers for each joint.
  # Corresponds to: joint_direction: list
  # 注意：夹爪已拆卸，移除 left_arm_joint_7 和 right_arm_joint_7 的方向
  joint_direction:
    - 1      # left_arm_joint_1
    - 1      # left_arm_joint_2
    - 1      # left_arm_joint_3
    - -1     # left_arm_joint_4
    - 1      # left_arm_joint_5
    - -1     # left_arm_joint_6
    # - 1    # left_arm_joint_7 (夹爪已拆卸)
    - 1      # right_arm_joint_1
    - 1      # right_arm_joint_2
    - 1      # right_arm_joint_3
    - 1      # right_arm_joint_4
    - 1      # right_arm_joint_5
    - -1     # right_arm_joint_6
    # - 1    # right_arm_joint_7 (夹爪已拆卸)
    - 1      # trunk_joint_1
    - -1     # trunk_joint_2

  # ==================== 力反馈配置（声音提示模式）====================
  # 当 Follower 遇到阻力时，播放声音提示用户
  # 阻力越大，声音越急促
  enable_force_feedback: true

  # 力检测参数
  force_threshold: 0.3           # 触发声音的力阈值 (Nm)
  force_debounce_count: 3        # 防抖计数（连续检测到超限多少次才触发）

  # 声音参数
  min_beep_interval: 0.1         # 最小蜂鸣间隔 (s) - 阻力最大时的声音频率
  max_beep_interval: 1.0         # 最大蜂鸣间隔 (s) - 刚超过阈值时的声音频率
  max_force_for_sound: 1.0       # 最大力参考值 (Nm) - 用于计算声音频率
# ===============================================
# Robot (Follower) Configuration
# ===============================================
robot:
  # Specifies which subclass of RobotConfig to use.
  # This matches the name in `@RobotConfig.register_subclass("supre_robot_follower")`
  type: supre_robot_follower

  # Path to the joint configuration file for the follower robot.
  # Corresponds to: SupreRobotFollowerConfig.joint_config_path
  joint_config_file: "trunk_config_supre_robot_joint.yaml"

  # Dictionary of camera configurations.
  # Corresponds to: cameras: dict[str, CameraConfig]
  cameras: {}



  # Maximum relative joint movement in degrees per control step.
  # Corresponds to: max_relative_joint_move: float
  max_relative_joint_move: 30.0

  # Port for the Prometheus monitoring server. Use `null` for None.
  # Corresponds to: prometheus_port: int | None
  prometheus_port: 8000

  # Control loop frequency in Hz.
  # Corresponds to: control_frequency: int
  control_frequency: 30

  # List of motor calibration settings for each joint.
  # Corresponds to: calibration: list[MotorCalibration]
  calibration:
    # --- Left Arm ---
    - joint_name: "left_arm_joint_1"
      min_position: -160.0
      max_position: 160.0
    - joint_name: "left_arm_joint_2"
      min_position: -90.0
      max_position: 0.0
    - joint_name: "left_arm_joint_3"
      min_position: -150.0
      max_position: 150.0
    - joint_name: "left_arm_joint_4"
      min_position: -90.0
      max_position: 0.0
    - joint_name: "left_arm_joint_5"
      min_position: -150.0
      max_position: 150.0
    - joint_name: "left_arm_joint_6"
      min_position: -90.0
      max_position: 90.0
    # - joint_name: "left_arm_joint_7"   # 夹爪已拆卸
    #   min_position: 0.0
    #   max_position: 1.0

    # --- Right Arm ---
    - joint_name: "right_arm_joint_1"
      min_position: -160.0
      max_position: 160.0
    - joint_name: "right_arm_joint_2"
      min_position: 0.0
      max_position: 165.0
    - joint_name: "right_arm_joint_3"
      min_position: -150.0
      max_position: 150.0
    - joint_name: "right_arm_joint_4"
      min_position: -70.0
      max_position: 90.0
    - joint_name: "right_arm_joint_5"
      min_position: -150.0
      max_position: 150.0
    - joint_name: "right_arm_joint_6"
      min_position: -90.0
      max_position: 90.0
    # - joint_name: "right_arm_joint_7"  # 夹爪已拆卸
    #   min_position: 0.0
    #   max_position: 1.0

    # --- Trunk ---
    - joint_name: "trunk_joint_1"
      min_position: -85.0
      max_position: 85.0
    - joint_name: "trunk_joint_2"
      min_position: 0.0
      max_position: 45.0
